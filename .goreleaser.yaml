version: 2

project_name: s3-summary

before:
  hooks:
    - go mod tidy

builds:
  - id: s3-summary
    main: .
    binary: s3-summary
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

# release-please owns the changelog; tell GoReleaser not to generate its own.
changelog:
  disable: true

release:
  draft: false
  prerelease: auto
